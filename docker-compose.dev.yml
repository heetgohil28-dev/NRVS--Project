version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: nrvs_backend_dev
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://nrvs_user:nrvs_password@db:5432/nrvs_db
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      NVD_API_KEY: ""
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      ALLOWED_HOSTS: localhost,127.0.0.1
      ENV: development
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
    ports:
      - "8000:8000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: nrvs_db_dev
    environment:
      POSTGRES_USER: nrvs_user
      POSTGRES_PASSWORD: nrvs_password
      POSTGRES_DB: nrvs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  reports_data:
