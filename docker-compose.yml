
services:
  db:
    image: postgres:16-alpine
    container_name: nrvs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nrvs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nrvs_password}
      POSTGRES_DB: ${POSTGRES_DB:-nrvs_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nrvs_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: nrvs_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nrvs_user}:${POSTGRES_PASSWORD:-nrvs_password}@db:5432/${POSTGRES_DB:-nrvs_db}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      NVD_API_KEY: ${NVD_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      ENV: ${ENV:-production}
    volumes:
      - reports_data:/app/reports
      - screenshots_data:/app/app/static/screenshots
    ports:
      - "8000:8000"
    cap_add:
      - NET_ADMIN
      - NET_RAW

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: nrvs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  reports_data:
  screenshots_data:
